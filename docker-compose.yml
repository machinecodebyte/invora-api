name: invora

services:
  backend:
    build:
      context: .
    container_name: invora-backend
    env_file:
      - .env
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DATABASE_URL: ${DOCKER_DATABASE_URL:?Set DOCKER_DATABASE_URL in .env}
      REDIS_URL: ${DOCKER_REDIS_URL:?Set DOCKER_REDIS_URL in .env}
      WORKER_ENABLED: "true"
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    depends_on:
      invora-postgres:
        condition: service_healthy
      invora-redis:
        condition: service_healthy
    networks:
      - invora-network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/api/v1/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  invora-worker:
    build:
      context: .
    container_name: invora-worker
    env_file:
      - .env
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DATABASE_URL: ${DOCKER_DATABASE_URL:?Set DOCKER_DATABASE_URL in .env}
      REDIS_URL: ${DOCKER_REDIS_URL:?Set DOCKER_REDIS_URL in .env}
      WORKER_ENABLED: "true"
    command: ["python", "-m", "app.modules.jobs.worker"]
    depends_on:
      invora-postgres:
        condition: service_healthy
      invora-redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - invora-network

  invora-postgres:
    image: postgres:16-alpine
    container_name: invora-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - invora-postgres-data:/var/lib/postgresql/data
    networks:
      - invora-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d invora"]
      interval: 10s
      timeout: 5s
      retries: 5

  invora-redis:
    image: redis:7-alpine
    container_name: invora-redis
    ports:
      - "${REDIS_HOST_PORT:-56379}:6379"
    volumes:
      - invora-redis-data:/data
    networks:
      - invora-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  invora-postgres-data:
    name: invora-postgres-data
  invora-redis-data:
    name: invora-redis-data

networks:
  invora-network:
    name: invora-network
    driver: bridge
