name: invora

services:
  backend:
    build:
      context: .
    container_name: invora-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@invora-postgres:5432/invora
      REDIS_URL: redis://invora-redis:6379/0
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    depends_on:
      invora-postgres:
        condition: service_healthy
      invora-redis:
        condition: service_healthy
    networks:
      - invora-network

  invora-postgres:
    image: postgres:16-alpine
    container_name: invora-postgres
    environment:
      POSTGRES_DB: invora
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - invora-postgres-data:/var/lib/postgresql/data
    networks:
      - invora-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d invora"]
      interval: 10s
      timeout: 5s
      retries: 5

  invora-redis:
    image: redis:7-alpine
    container_name: invora-redis
    ports:
      - "${REDIS_HOST_PORT:-56379}:6379"
    volumes:
      - invora-redis-data:/data
    networks:
      - invora-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  invora-postgres-data:
    name: invora-postgres-data
  invora-redis-data:
    name: invora-redis-data

networks:
  invora-network:
    name: invora-network
    driver: bridge
